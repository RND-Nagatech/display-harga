<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.6" stop-color="#050812"/>
      <stop offset="1" stop-color="#05040b"/>
    </linearGradient>
    <radialGradient id="r1" cx="30%" cy="30%" r="55%">
      <stop offset="0" stop-color="#f5c241" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r2" cx="80%" cy="70%" r="60%">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="r3" cx="65%" cy="25%" r="50%">
      <stop offset="0" stop-color="#a855f7" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#g)"/>
  <rect width="1600" height="1000" fill="url(#r1)"/>
  <rect width="1600" height="1000" fill="url(#r2)"/>
  <rect width="1600" height="1000" fill="url(#r3)"/>
  <rect width="1600" height="1000" filter="url(#grain)" opacity="0.6"/>
</svg>

